    <script>
      (function() {
        try {
          var t = localStorage.getItem('echat-theme') || 'dark';
          document.documentElement.classList.add(t === 'light' ? 'light' : 'dark');
        } catch(e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
